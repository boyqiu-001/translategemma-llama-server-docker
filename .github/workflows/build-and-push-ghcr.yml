name: Build And Push GHCR

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Image variant to build"
        type: choice
        required: true
        default: mainstream
        options:
          - mainstream
          - legacy
          - future
          - cpu
          - all
      push:
        description: "Push image to GHCR"
        type: boolean
        required: true
        default: true
      llama_cpp_ref:
        description: "llama.cpp ref (branch/tag/commit/refspec)"
        type: string
        required: false
        default: refs/pull/19052/head
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: mainstream
            dockerfile: MainstreamCudaDockerfile
          - variant: legacy
            dockerfile: LegacyCudaDockerfile
          - variant: future
            dockerfile: FutureCudaDockerfile
          - variant: cpu
            dockerfile: Dockerfile
    if: >
      (github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.variant == 'all' || github.event.inputs.variant == matrix.variant)) ||
      (github.event_name != 'workflow_dispatch' && matrix.variant == 'mainstream')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/translategemma-llama-server
          tags: |
            type=raw,value=${{ matrix.variant }}-latest,enable={{is_default_branch}}
            type=ref,event=branch,prefix=${{ matrix.variant }}-
            type=ref,event=tag,prefix=${{ matrix.variant }}-
            type=sha,prefix=${{ matrix.variant }}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LLAMA_CPP_REF=${{ github.event.inputs.llama_cpp_ref || vars.LLAMA_CPP_REF || 'refs/pull/19052/head' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
