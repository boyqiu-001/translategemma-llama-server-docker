name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose -f compose.yaml config

  build-cpu-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build CPU image (smoke)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          build-args: |
            LLAMA_CPP_REF=refs/pull/19052/head
          tags: local/translategemma-cpu:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
